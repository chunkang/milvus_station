<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Milvus Station">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- vector nodes -->
  <g fill="#ffffff" fill-opacity="0.9">
    <circle cx="20" cy="22" r="3.2"/>
    <circle cx="34" cy="16" r="3.2"/>
    <circle cx="19" cy="38" r="3.2"/>
    <circle cx="33" cy="34" r="3.2"/>
  </g>
  <!-- edges connecting the nodes -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="22" x2="34" y2="16"/>
    <line x1="20" y1="22" x2="19" y2="38"/>
    <line x1="20" y1="22" x2="33" y2="34"/>
    <line x1="34" y1="16" x2="33" y2="34"/>
  </g>
  <!-- search magnifier -->
  <g stroke="#ffffff" stroke-width="4.5" fill="none" stroke-linecap="round">
    <circle cx="40" cy="40" r="9"/>
    <line x1="47" y1="47" x2="54" y2="54"/>
  </g>
</svg>
