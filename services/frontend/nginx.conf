server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA client-side routing: fall back to index.html for unknown paths
    # so routes like /mysql resolve to the app entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Lightweight health endpoint for the HEALTHCHECK and upstream ingress.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
