# nginx ingress for milvus_station (SPEC-INFRA-001).
# The sole host-facing server block. Serves the React SPA build and reverse
# proxies the admin (/mysql) and API (/api) paths onto internal services.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Lightweight ingress health endpoint (used by the container HEALTHCHECK).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ------------------------------------------------------------------
    # phpMyAdmin under /mysql/. Redirect the bare /mysql to the trailing
    # slash form so relative asset URLs resolve. PMA_ABSOLUTE_URI on the
    # phpmyadmin service makes it emit correct /mysql/ prefixed links.
    # ------------------------------------------------------------------
    location = /mysql {
        return 301 /mysql/;
    }

    location /mysql/ {
        proxy_pass http://phpmyadmin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # FastAPI backend under /api/. The trailing slash on proxy_pass strips
    # the /api prefix, so /api/health -> /health upstream.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://fastapi:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-lived cache for hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # React SPA. Fall back to index.html for client-side routing so the
    # hello-world page always renders regardless of backend state (N4).
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
